name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

  publish:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - rid: win-x64
            artifact: DBToRestAPI-win-x64
          - rid: linux-x64
            artifact: DBToRestAPI-linux-x64
          - rid: linux-arm64
            artifact: DBToRestAPI-linux-arm64
          - rid: osx-x64
            artifact: DBToRestAPI-osx-x64
          - rid: osx-arm64
            artifact: DBToRestAPI-osx-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: >
          dotnet publish DBToRestAPI/DBToRestAPI.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          --output ./publish/${{ matrix.artifact }}

      - name: Package (tar.gz)
        if: ${{ !startsWith(matrix.rid, 'win') }}
        run: tar -czf ${{ matrix.artifact }}.tar.gz -C ./publish ${{ matrix.artifact }}

      - name: Package (zip)
        if: startsWith(matrix.rid, 'win')
        run: cd ./publish && zip -r ../${{ matrix.artifact }}.zip ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*

  release:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
